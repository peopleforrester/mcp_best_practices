## MCP Architecture
### State, composition, discovery

Note:
System-level questions: where does state live, how do servers compose, how is a server discovered.

---

### Stateful session vs stateless handle

- 2025-11-25: `Mcp-Session-Id`, sticky routing or shared store
- 2026-07-28 RC: no session; state via a server-minted handle as a tool arg

```text
create_basket() -> "basket-1"
add_item("basket-1", "apple") -> {count: 1}
get_basket("basket-1") -> {items: ["apple"]}
```

Note:
The handle form runs behind a plain load balancer; any instance with the store serves any call.

---

### Server composition

```python
composite.mount(build_basket_server(), namespace="basket")
composite.mount(build_math_server(),  namespace="math")
```

One host, the union of both toolsets, one connection.

Note:
mount() is a live link; import_server() is a static copy.

---

### Registry and discovery

- Official registry is preview (API v0.1)
- Publish a `server.json`; validate it offline in CI
- `.well-known/mcp/server-card.json` for pre-connection discovery (SEP draft)

Note:
We validate the load-bearing fields without contacting the live service. The card shape is still draft.

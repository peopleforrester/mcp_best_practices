<!doctype html>
<!-- ABOUTME: Markup for the MCP exam frontend; styles and script are external (served from /static).
     ABOUTME: External assets let the app enforce a strict Content-Security-Policy with no unsafe-inline. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Exam</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <h1>MCP Exam</h1>
    <p class="meta">
      Built against MCP <code>2025-11-25</code>. Answer the questions and submit for a scored result.
      API docs at <a href="/docs">/docs</a>.
    </p>
    <div id="exam">Loading questions...</div>
    <button id="submit" class="hidden">Submit exam</button>
    <div id="result" class="hidden">
      <div id="score"></div>
      <div id="detail"></div>
      <button id="retry">Try again</button>
    </div>
  </body>
</html>

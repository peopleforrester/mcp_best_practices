## MCP Exam Prep
### A curriculum and a quiz app

Note:
Define what to know, then test it. Both shipped, the app tested and Railway-ready.

---

### The curriculum

13 ordered modules, primitives to systems to security, each mapped to a track.

```text
JSON-RPC -> lifecycle -> transports -> primitives ->
architecture -> authorization -> OWASP/NSA -> ecosystem
```

Note:
Study path and code tracks line up. Full sourced version is in the research doc.

---

### The quiz app (FastAPI)

```text
GET  /exam          -> questions, no answer key
POST /exam/submit   -> score + per-domain breakdown
GET  /health        -> platform healthcheck
```

Bank validated on load; scoring is a pure function.

Note:
The taker gets a QuestionView, never the answer or rationale. Scoring has no IO, so it is unit-tested.

---

### Railway deploy

```json
{ "build": { "builder": "RAILPACK" },
  "deploy": { "startCommand": "uvicorn mcp_quiz.app:app --host 0.0.0.0 --port $PORT" } }
```

Config shipped; creating the project is an account action, left for go-ahead.

Note:
PORT is injected by Railway. Postgres would store results; scoring is stateless today.

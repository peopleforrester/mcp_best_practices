## MCP Use Cases & Ecosystem
### A real server, an agent bridge, an honest map

Note:
Two buildable use cases and one map that labels every adoption claim.

---

### Production server over Kubernetes

```python
@mcp.tool(annotations=ToolAnnotations(readOnlyHint=True))
def find_pods(namespace: str, label_selector: str = "") -> PodPage: ...
```

Injected CoreV1Api: tests use real V1Pod models, no cluster. RBAC is the boundary.

Note:
Trimmed human-readable views, not raw V1Pod dumps. Read-only; mutations would gate behind the gateway.

---

### MCP plus A2A

```python
@mcp.tool
def ask_specialist(question: str) -> str:
    return delegate.ask(question)   # an A2A client in production
```

MCP connects agents to tools; A2A connects agents to each other.

Note:
The delegate is a Protocol; the real a2a-sdk wiring is in the spike. The seam is the point.

---

### An honest ecosystem map

- Governance + protocol: verified
- Download counts: vendor self-reported, directional
- Independent census: 12.9% of 17,468 servers "high trust"

Note:
The honest version is more credible than the marketing one.

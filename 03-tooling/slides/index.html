## MCP Tooling
### Design tools agents use well, then measure it

Note:
Opinions about tool design are cheap. This track ships a harness that scores it.

---

### The matched pair

- `getData(x)`: vague name, meaningless param, terse description, dumps everything, leaks ids
- `contacts_search(query, team, limit, cursor)`: namespaced, clear, paginated, structured, no ids

Note:
Search over list-everything; return meaning, not raw ids; manage tokens with pagination.

---

### The eval harness (deterministic, offline)

```text
evaluate_server(client) -> { tool_name: Scorecard }
Scorecard: namespaced, described, clear_params, paginated, concise_response
```

No LLM, no network. CI-safe and reproducible.

Note:
The good tool scores 5/5; the anti-pattern fails namespacing, pagination, and conciseness.

---

### All four annotations

```python
@mcp.tool(annotations=ToolAnnotations(readOnlyHint=True))
def read_status() -> str: ...
```

`readOnlyHint`, `destructiveHint`, `idempotentHint`, `openWorldHint`.

Note:
Annotations are advisory and untrusted unless the server is trusted. Enforcement lives in the gateway.

---

### Code execution with MCP

For many-tool servers: load tools as code on demand, not all definitions upfront. Large token savings (vendor-reported).

Note:
The harness conciseness metric is the small, local cousin: keep each tool lean.

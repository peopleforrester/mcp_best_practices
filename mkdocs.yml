# ABOUTME: MkDocs Material site config for the MCP portfolio docs.
# ABOUTME: Material is in maintenance mode (pinned 9.7.x); revisit Zensical when it reaches GA.
site_name: MCP Best Practices
site_description: A security-first, polyglot Model Context Protocol subject-matter-expertise portfolio
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Build Plan: BUILD_PLAN.md
  - Spec Currency: spec-currency.md
  - Best-Practice Verification: best-practice-verification-2026-06-24.md
  - Research:
      - Founding Report: research/mcp-sme-portfolio-research-2026-06.md
      - Version Currency: research/version-currency-2026-06-23.md
      - Exam Curriculum: research/exam-curriculum-2026-06-23.md
      - Spikes:
          - TypeScript SDK: research/spikes/typescript-sdk.md
          - FastMCP Advanced: research/spikes/fastmcp-advanced.md
          - Tool Design & Eval: research/spikes/tool-design-eval.md
          - Architecture & Registry: research/spikes/architecture-registry.md
          - A2A Integration: research/spikes/a2a-integration.md
          - Kubernetes MCP Server: research/spikes/kubernetes-mcp-server.md
          - Quiz App & Railway: research/spikes/quiz-app-railway.md
          - Exam Item-Writing: research/spikes/exam-item-writing.md
          - MCP Question Content: research/spikes/mcp-question-content.md
          - RC 2026-07-28 Readiness: research/spikes/mcp-rc-2026-07-28-readiness.md

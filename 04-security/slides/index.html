## MCP Security
### Threat models to controls

Built against MCP `2025-11-25` (stable). RC `2026-07-28` noted as preview.

Note:
Flagship track. We model the attack surface first, then build the controls the model demands.

---

### Six trust zones

Host · Client · LLM · Server · Data stores · Auth server

Each gets a STRIDE model, every threat mapped to OWASP MCP Top 10 and the NSA CSI.

Note:
Trust-zone decomposition is NSA CSI recommendation 2. The lethal trifecta converges at the host.

---

### Four controls

1. Policy gateway: allowlist, consent, OPA-style rules, SIEM audit
2. Guardrails: injection detection, secret/PII redaction
3. Signed registry: Ed25519 provenance before admission
4. OAuth: RFC 8707 audience binding, no passthrough

Note:
No single control is sufficient. They compose: registry decides which servers exist, gateway decides
which calls run, guardrails sanitize content, audience-bound tokens stop credential replay.

---

### Policy gateway (the spine)

```python
class PolicyMiddleware(Middleware):
    async def on_call_tool(self, context, call_next):
        req = PolicyRequest(..., tool_name=context.message.name, ...)
        result = self._engine.evaluate(req)      # default-deny
        self._audit_sink(audit_record(req, result, ...))
        if result.decision is Decision.DENY:
            raise ToolError(f"policy denied: {result.reason}")
        return await call_next(context)
```

Note:
Secure default-deny: allowlist, then deny rules, then consent gate. Arguments are sha256-hashed in the
audit record, never logged in plaintext.

---

### Confused deputy, defeated

A token minted for server A is rejected at server B.

```text
issue(aud=A) -> validate at A: ACCEPT
            -> validate at B: REJECT (audience mismatch, RFC 8707)
passthrough(A-token -> B): REJECT      # the forbidden anti-pattern
token exchange(aud=B) -> validate at B: ACCEPT   # the correct flow
```

Note:
Token passthrough is forbidden by the MCP authorization spec. Audience binding is what makes the
rejection happen. Verified with real Ed25519 signatures.

---

### Honest about limits

- Injection detectors are heuristics, not a complete defense.
- Real control is least-privilege tool design plus the gateway.
- cosign backend is an integration concern, documented not faked.

Note:
The teaching value is in being precise about what each control does and does not do.

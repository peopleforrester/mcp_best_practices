# ABOUTME: CI for the MCP portfolio: prose, strict docs, per-language tests + types, lockfile drift.
# ABOUTME: Third-party actions are pinned to a full commit SHA (supply-chain hygiene we also teach).
name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Em-dash check (authored docs; verbatim research report exempt)
        run: |
          if grep -rnP '\x{2014}' --include='*.md' --include='*.html' \
               --exclude='mcp-sme-portfolio-research-*.md' \
               --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=site --exclude-dir=.git \
               .; then
            echo "::error::em-dash (U+2014) found in authored docs"
            exit 1
          fi
          echo "prose clean"

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Strict docs build
        run: uv run --with-requirements docs/requirements.txt mkdocs build --strict

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Lint, type-check, and test each Python package
        run: |
          pkgs=$(find . -name pyproject.toml -not -path '*/.venv/*' -not -path '*/node_modules/*' -exec dirname {} \;)
          if [ -z "$pkgs" ]; then echo "no Python packages yet; skipping"; exit 0; fi
          for d in $pkgs; do
            echo "::group::$d"
            (
              cd "$d"
              uv run ruff check .
              [ -d src ] && uv run mypy --config-file "$GITHUB_WORKSPACE/mypy.ini" src
              if find . -name 'test_*.py' -not -path '*/.venv/*' | grep -q .; then
                uv run pytest -q
              else
                echo "::error::$d has Python sources but no tests (no-skip-tests policy)"
                exit 1
              fi
            )
            echo "::endgroup::"
          done

  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable
      - name: Test each TypeScript package
        run: |
          pkgs=$(find . -name package.json -not -path '*/node_modules/*' -exec dirname {} \;)
          if [ -z "$pkgs" ]; then echo "no TypeScript packages yet; skipping"; exit 0; fi
          for d in $pkgs; do
            echo "::group::$d"
            ( cd "$d" && pnpm install --frozen-lockfile && pnpm test && pnpm typecheck )
            echo "::endgroup::"
          done

  lockdrift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fail if a shared dependency resolves to different versions across uv.lock files
        run: |
          status=0
          for pkg in fastmcp mcp; do
            versions=$(grep -hrA1 "^name = \"$pkg\"\$" --include=uv.lock . | grep '^version = ' | awk '{print $3}' | sort -u)
            distinct=$(echo "$versions" | grep -c .)
            echo "$pkg: ${versions:-(absent)}"
            if [ "$distinct" -gt 1 ]; then
              echo "::error::$pkg resolves to multiple versions across lockfiles"
              status=1
            fi
          done
          exit $status

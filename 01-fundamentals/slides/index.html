## MCP Fundamentals
### The primitives, in Python and TypeScript

Built against MCP `2025-11-25`.

Note:
We show each concept twice so it stands apart from any one SDK.

---

### Three server primitives

- Tools: typed callable functions (`echo`)
- Resources: read-only data by URI (`greeting://{name}`)
- Prompts: reusable templates (`summarize`)

Note:
A client connects, negotiates capabilities, then lists and calls these. Tests assert that whole flow.

---

### Python (FastMCP)

```python
@mcp.tool
def echo(text: str) -> str:
    return text

@mcp.resource("greeting://{name}")
def greeting(name: str) -> str:
    return f"Hello, {name}!"
```

Note:
The catalog server adds a paginated, search-focused tool with progress and typed output.

---

### TypeScript (@modelcontextprotocol/sdk)

```ts
server.registerTool(
  "echo",
  { description: "Echo", inputSchema: { text: z.string() } },
  async ({ text }) => ({ content: [{ type: "text", text }] }),
);
```

Note:
Input schemas are Zod raw shapes. Pin the SDK to ^1.29 and zod to v3.

---

### Conformance-style tests

Both suites drive the server over an in-memory transport: connect, negotiate, list, call.

```text
Python:    Client(server) -> call_tool -> result.structured_content
TypeScript: InMemoryTransport.createLinkedPair() -> client.callTool
```

Note:
Testing over the real transport asserts the protocol surface, not just the function return.

---

### Transports

stdio for local, Streamable HTTP for remote. HTTP+SSE is legacy since 2025-03-26.

Note:
The stateful-session vs stateless-handle HTTP forms are in the Architecture track.
